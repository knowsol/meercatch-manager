version: "3.9"

# ============================================================
# Workspace: meercatch
# ============================================================

networks:
  ai-dev-network:
    external: true
  local:
    driver: bridge

services:

  # ── Web (매니저 대시보드) ──────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: meercatch-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    environment:
      NODE_ENV:       ${NODE_ENV:-development}
      PORT:           ${WEB_PORT}
      API_URL:        http://api:${API_PORT}
      PUBLIC_API_URL: http://${SERVER_IP}:${API_PORT}
    networks:
      - ai-dev-network
      - local
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Admin (내부 운영) ─────────────────────────────────────
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: meercatch-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT}:${ADMIN_PORT}"
    environment:
      NODE_ENV:       ${NODE_ENV:-development}
      PORT:           ${ADMIN_PORT}
      API_URL:        http://api:${API_PORT}
      PUBLIC_API_URL: http://${SERVER_IP}:${API_PORT}
    networks:
      - ai-dev-network
      - local
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── API (Meercatch Backend) ───────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: meercatch-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      NODE_ENV:     ${NODE_ENV:-development}
      PORT:         ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET:   ${JWT_SECRET}
    networks:
      - ai-dev-network
      - local
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: meercatch-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - meercatch_pg_data:/var/lib/postgresql/data
      - ./apps/api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  meercatch_pg_data:
