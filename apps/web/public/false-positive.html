<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오탐 검토 — Meercatch 매니저</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }

    nav {
      background: #1e40af;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { font-size: 18px; font-weight: 800; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { color: #bfdbfe; text-decoration: none; font-size: 14px; padding: 6px 14px; border-radius: 6px; transition: background .2s; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: #bfdbfe; }
    .btn-logout { background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 13px; padding: 5px 12px; border-radius: 6px; cursor: pointer; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    .page-title { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 20px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: #e2e8f0;
      border-radius: 10px;
      padding: 4px;
      width: fit-content;
    }
    .tab-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      transition: all .2s;
    }
    .tab-btn.active { background: #fff; color: #1e40af; box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    /* ── TABLE ── */
    .table-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    .table-header { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .table-title { font-size: 15px; font-weight: 700; color: #1e293b; }
    .table-count { font-size: 13px; color: #64748b; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #f8fafc; padding: 11px 16px; text-align: left; font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 12px 16px; font-size: 14px; color: #374151; }
    .empty-row td { text-align: center; padding: 40px; color: #94a3b8; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .badge-SUBMITTED { background: #e0f2fe; color: #0369a1; }
    .badge-REVIEWED  { background: #fef3c7; color: #b45309; }
    .badge-APPLIED   { background: #dcfce7; color: #166534; }
    .badge-REJECTED  { background: #fee2e2; color: #dc2626; }
    .badge-GUIDE     { background: #e0f2fe; color: #0369a1; }
    .badge-CAUTION   { background: #fef3c7; color: #b45309; }
    .badge-WARNING   { background: #fee2e2; color: #dc2626; }

    .reason-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-review {
      padding: 5px 12px;
      border: 1.5px solid #3b82f6;
      background: #fff;
      color: #3b82f6;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-review:hover { background: #3b82f6; color: #fff; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 28px 32px; width: 100%; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,.16); }
    .modal h3 { font-size: 17px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .detail-label { font-size: 12px; font-weight: 700; color: #64748b; min-width: 80px; padding-top: 2px; }
    .detail-value { font-size: 14px; color: #1e293b; flex: 1; }
    hr { border: none; border-top: 1px solid #f1f5f9; margin: 16px 0; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .modal-field textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 14px; color: #1e293b; outline: none; resize: vertical; min-height: 72px; }
    .modal-field textarea:focus { border-color: #3b82f6; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { padding: 9px 18px; border: 1.5px solid #e2e8f0; background: #fff; border-radius: 7px; font-size: 14px; cursor: pointer; }
    .btn-apply  { padding: 9px 18px; background: #16a34a; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-reject { padding: 9px 18px; background: #dc2626; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">🔍 Meercatch</div>
    <div class="nav-links">
      <a href="/dashboard.html" class="nav-link">탐지 현황</a>
      <a href="/false-positive.html" class="nav-link active">오탐 검토</a>
      <a href="/pause.html" class="nav-link">탐지 중단</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">오탐 검토</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('SUBMITTED', this)">미검토</button>
      <button class="tab-btn" onclick="switchTab('APPLIED', this)">인정됨</button>
      <button class="tab-btn" onclick="switchTab('REJECTED', this)">반려됨</button>
    </div>

    <div class="table-card">
      <div class="table-header">
        <span class="table-title" id="tableTitle">미검토 오탐 신고</span>
        <span class="table-count" id="tableCount">0건</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>신고 일시</th>
            <th>학생</th>
            <th>탐지 유형</th>
            <th>알림 단계</th>
            <th>신고 사유</th>
            <th>상태</th>
            <th>검토</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="7">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 검토 Modal -->
  <div class="modal-overlay" id="reviewModal">
    <div class="modal">
      <h3>📋 오탐 검토</h3>
      <div class="detail-row"><span class="detail-label">탐지 유형</span><span class="detail-value" id="detDetectionType">—</span></div>
      <div class="detail-row"><span class="detail-label">탐지 일시</span><span class="detail-value" id="detDetectedAt">—</span></div>
      <div class="detail-row"><span class="detail-label">알림 단계</span><span class="detail-value" id="detLevel">—</span></div>
      <div class="detail-row"><span class="detail-label">신고 사유</span><span class="detail-value" id="detReason">—</span></div>
      <div class="detail-row"><span class="detail-label">비고</span><span class="detail-value" id="detNote">—</span></div>
      <hr />
      <div class="modal-field">
        <label>검토 메모 (선택)</label>
        <textarea id="reviewNote" placeholder="검토 내용을 입력하세요..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-reject" onclick="submitReview('REJECTED')">반려</button>
        <button class="btn-apply"  onclick="submitReview('APPLIED')">오탐 인정</button>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const API      = window.API_URL || 'http://192.168.0.200:4002';
    const token    = localStorage.getItem('mgr_token');
    if (!token) location.href = '/index.html';

    document.getElementById('navUser').textContent = localStorage.getItem('mgr_name') || '매니저';

    const authHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    let currentStatus  = 'SUBMITTED';
    let currentReportId = null;

    function switchTab(status, btn) {
      currentStatus = status;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const labels = { SUBMITTED: '미검토 오탐 신고', APPLIED: '인정된 오탐', REJECTED: '반려된 오탐' };
      document.getElementById('tableTitle').textContent = labels[status];
      loadReports();
    }

    async function loadReports() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">불러오는 중...</td></tr>';

      try {
        const res  = await fetch(`${API}/false-positives?status=${currentStatus}&limit=50`, {
          headers: authHeaders,
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        renderReports(data.data || data);
        document.getElementById('tableCount').textContent = `${(data.total || (data.data || data).length)}건`;
      } catch (e) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">데이터를 불러올 수 없습니다.</td></tr>';
      }
    }

    function renderReports(list) {
      const tbody = document.getElementById('tableBody');
      if (!list || list.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">신고 내역이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(r => `
        <tr>
          <td>${fmtDate(r.reported_at)}</td>
          <td>${r.student_name || '—'} (${r.student_number || '—'}번)</td>
          <td>${r.detection_type || '—'}</td>
          <td><span class="badge badge-${r.notification_level || 'NONE'}">${levelLabel(r.notification_level)}</span></td>
          <td class="reason-cell" title="${r.report_reason}">${r.report_reason}</td>
          <td><span class="badge badge-${r.status}">${statusLabel(r.status)}</span></td>
          <td>
            ${r.status === 'SUBMITTED'
              ? `<button class="btn-review" onclick='openReview(${JSON.stringify(r)})'>검토하기</button>`
              : '—'}
          </td>
        </tr>
      `).join('');
    }

    function openReview(r) {
      currentReportId = r.report_id;
      document.getElementById('detDetectionType').textContent = r.detection_type || '—';
      document.getElementById('detDetectedAt').textContent    = fmtDate(r.detected_at);
      document.getElementById('detLevel').textContent         = levelLabel(r.notification_level);
      document.getElementById('detReason').textContent        = r.report_reason || '—';
      document.getElementById('detNote').textContent          = r.note || '—';
      document.getElementById('reviewNote').value             = '';
      document.getElementById('reviewModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('reviewModal').classList.remove('show');
      currentReportId = null;
    }

    async function submitReview(decision) {
      if (!currentReportId) return;
      const reviewNote = document.getElementById('reviewNote').value;
      try {
        const res = await fetch(`${API}/false-positives/${currentReportId}/review`, {
          method: 'PATCH',
          headers: authHeaders,
          body: JSON.stringify({ decision, reviewNote }),
        });
        if (res.ok) {
          alert(decision === 'APPLIED' ? '오탐으로 인정되었습니다.' : '반려되었습니다.');
          closeModal();
          loadReports();
        } else {
          const d = await res.json();
          alert(d.error || '처리 실패');
        }
      } catch (e) {
        alert('서버에 연결할 수 없습니다.');
      }
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function levelLabel(lv) {
      return { GUIDE: '안내', CAUTION: '주의', WARNING: '경고', NONE: '없음' }[lv] || (lv || '—');
    }
    function statusLabel(s) {
      return { SUBMITTED: '미검토', REVIEWED: '검토중', APPLIED: '인정', REJECTED: '반려' }[s] || s;
    }
    function logout() { localStorage.clear(); location.href = '/index.html'; }

    loadReports();
  </script>
</body>
</html>
