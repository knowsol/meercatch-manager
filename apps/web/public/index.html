<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meercatch 매니저</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1e40af;
      letter-spacing: -0.5px;
    }
    .logo p {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      color: #1e293b;
      transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    .btn-login:hover { background: #1d3fa0; }
    .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 16px;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <h1>🔍 Meercatch</h1>
      <p>매니저 관리 포털</p>
    </div>
    <div class="card">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@school.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-login" id="loginBtn" onclick="login()">로그인</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const API = window.API_URL || 'http://192.168.0.200:4002';

    // 이미 로그인된 경우 대시보드로 이동
    if (localStorage.getItem('mgr_token')) {
      location.href = '/dashboard.html';
    }

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errEl    = document.getElementById('errorMsg');

      // 입력 없이 로그인 버튼만 눌러도 통과
      if (!email && !password) {
        localStorage.setItem('mgr_token',    'dev-bypass');
        localStorage.setItem('mgr_name',     '매니저');
        localStorage.setItem('mgr_schoolId', '1');
        location.href = '/dashboard.html';
        return;
      }

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      errEl.classList.remove('show');

      try {
        const res  = await fetch(`${API}/manager/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          // API 실패해도 바로 대시보드 진입
          localStorage.setItem('mgr_token',    'dev-bypass');
          localStorage.setItem('mgr_name',     '매니저');
          localStorage.setItem('mgr_schoolId', '1');
          location.href = '/dashboard.html';
          return;
        }

        localStorage.setItem('mgr_token',    data.token);
        localStorage.setItem('mgr_name',     data.name || '매니저');
        localStorage.setItem('mgr_schoolId', data.schoolId);
        location.href = '/dashboard.html';
      } catch (e) {
        // 서버 연결 실패시에도 바로 대시보드 진입
        localStorage.setItem('mgr_token',    'dev-bypass');
        localStorage.setItem('mgr_name',     '매니저');
        localStorage.setItem('mgr_schoolId', '1');
        location.href = '/dashboard.html';
      } finally {
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    // Enter 키 로그인
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
