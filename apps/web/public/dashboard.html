<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탐지 현황 — Meercatch 매니저</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }

    /* ── NAV ── */
    nav {
      background: #1e40af;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      color: #bfdbfe;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background .2s;
    }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: #bfdbfe; }
    .btn-logout {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,.25); }

    /* ── LAYOUT ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: #64748b; }
    select, .filter-bar input[type="date"] {
      padding: 8px 10px;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: 14px;
      color: #1e293b;
      outline: none;
      min-width: 130px;
    }
    select:focus, .filter-bar input:focus { border-color: #3b82f6; }
    .btn-search {
      padding: 9px 20px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
    }
    .btn-search:hover { background: #1d3fa0; }
    .btn-pause {
      padding: 9px 16px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
    }
    .btn-pause:hover { background: #ea6c0a; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .stat-label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: #1e293b; }
    .stat-card.guide  .stat-value { color: #0ea5e9; }
    .stat-card.caution .stat-value { color: #f59e0b; }
    .stat-card.warning .stat-value { color: #ef4444; }

    /* ── TABLE ── */
    .table-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-title { font-size: 15px; font-weight: 700; color: #1e293b; }
    .table-count { font-size: 13px; color: #64748b; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8fafc;
      padding: 11px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #e2e8f0;
    }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 12px 16px; font-size: 14px; color: #374151; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-GUIDE   { background: #e0f2fe; color: #0369a1; }
    .badge-CAUTION { background: #fef3c7; color: #b45309; }
    .badge-WARNING { background: #fee2e2; color: #dc2626; }
    .badge-NONE    { background: #f1f5f9; color: #64748b; }
    .empty-row td { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,.16);
    }
    .modal h3 { font-size: 17px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .modal-field input, .modal-field textarea, .modal-field select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: 14px;
      color: #1e293b;
      outline: none;
    }
    .modal-field input:focus, .modal-field textarea:focus { border-color: #3b82f6; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      padding: 9px 18px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      border-radius: 7px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-confirm {
      padding: 9px 18px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">🔍 Meercatch</div>
    <div class="nav-links">
      <a href="/dashboard.html" class="nav-link active">탐지 현황</a>
      <a href="/false-positive.html" class="nav-link">오탐 검토</a>
      <a href="/pause.html" class="nav-link">탐지 중단</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>범위</label>
        <select id="scopeType" onchange="loadClasses()">
          <option value="class">반별</option>
          <option value="grade">학년별</option>
        </select>
      </div>
      <div class="filter-group">
        <label>학년</label>
        <select id="gradeSelect" onchange="loadClasses()">
          <option value="">학년 선택</option>
        </select>
      </div>
      <div class="filter-group" id="classGroup">
        <label>반</label>
        <select id="classSelect">
          <option value="">반 선택</option>
        </select>
      </div>
      <div class="filter-group">
        <label>시작일</label>
        <input type="date" id="fromDate" />
      </div>
      <div class="filter-group">
        <label>종료일</label>
        <input type="date" id="toDate" />
      </div>
      <button class="btn-search" onclick="loadDetections()">조회</button>
      <button class="btn-pause" onclick="openPauseModal()">탐지 중단 설정</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">전체</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card guide">
        <div class="stat-label">안내 (GUIDE)</div>
        <div class="stat-value" id="statGuide">—</div>
      </div>
      <div class="stat-card caution">
        <div class="stat-label">주의 (CAUTION)</div>
        <div class="stat-value" id="statCaution">—</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-label">경고 (WARNING)</div>
        <div class="stat-value" id="statWarning">—</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">탐지 이벤트 목록</span>
        <span class="table-count" id="tableCount">0건</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>탐지 일시</th>
            <th>학생</th>
            <th>탐지 유형</th>
            <th>심각도</th>
            <th>알림 단계</th>
            <th>플랫폼</th>
            <th>오탐</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="7">학년/반을 선택하고 조회하세요.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 탐지 중단 Modal -->
  <div class="modal-overlay" id="pauseModal">
    <div class="modal">
      <h3>⏸ 탐지 중단 설정</h3>
      <div class="modal-field">
        <label>범위</label>
        <select id="pauseScopeType">
          <option value="class">반</option>
          <option value="grade">학년</option>
        </select>
      </div>
      <div class="modal-field">
        <label>시작 일시</label>
        <input type="datetime-local" id="pauseStart" />
      </div>
      <div class="modal-field">
        <label>종료 일시</label>
        <input type="datetime-local" id="pauseEnd" />
      </div>
      <div class="modal-field">
        <label>사유</label>
        <input type="text" id="pauseReason" placeholder="예) 학교 행사, 시험 기간" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closePauseModal()">취소</button>
        <button class="btn-confirm" onclick="submitPause()">적용</button>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const API   = window.API_URL || 'http://192.168.0.200:4002';
    const token = localStorage.getItem('mgr_token');
    const schoolId = localStorage.getItem('mgr_schoolId');

    if (!token) location.href = '/index.html';

    document.getElementById('navUser').textContent =
      localStorage.getItem('mgr_name') || '매니저';

    const authHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    // ── 초기 데이터 로드 ──────────────────────────────────
    async function init() {
      try {
        const res   = await fetch(`${API}/managed/schools/${schoolId}/grades`, {
          headers: authHeaders,
        });
        const grades = await res.json();
        const sel   = document.getElementById('gradeSelect');
        grades.forEach(g => {
          const opt = document.createElement('option');
          opt.value = g.grade_id;
          opt.textContent = g.name;
          sel.appendChild(opt);
        });
      } catch (e) {
        console.error('학년 로드 실패', e);
      }
    }

    async function loadClasses() {
      const gradeId   = document.getElementById('gradeSelect').value;
      const classSel  = document.getElementById('classSelect');
      const scopeType = document.getElementById('scopeType').value;

      // 학년별 모드면 반 선택 숨김
      document.getElementById('classGroup').style.display =
        scopeType === 'grade' ? 'none' : 'flex';

      classSel.innerHTML = '<option value="">반 선택</option>';
      if (!gradeId || scopeType === 'grade') return;

      try {
        const res     = await fetch(`${API}/managed/grades/${gradeId}/classes`, {
          headers: authHeaders,
        });
        const classes = await res.json();
        classes.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.class_id;
          opt.textContent = c.name;
          classSel.appendChild(opt);
        });
      } catch (e) {
        console.error('반 로드 실패', e);
      }
    }

    // ── 탐지 조회 ─────────────────────────────────────────
    async function loadDetections() {
      const scopeType = document.getElementById('scopeType').value;
      const gradeId   = document.getElementById('gradeSelect').value;
      const classId   = document.getElementById('classSelect').value;
      const from      = document.getElementById('fromDate').value;
      const to        = document.getElementById('toDate').value;

      const targetId = scopeType === 'grade' ? gradeId : classId;
      if (!targetId) {
        alert(scopeType === 'grade' ? '학년을 선택해주세요.' : '반을 선택해주세요.');
        return;
      }

      const endpoint = scopeType === 'grade'
        ? `/manager/grades/${targetId}/detections`
        : `/manager/classes/${targetId}/detections`;

      const params = new URLSearchParams({ limit: 100 });
      if (from) params.set('from', new Date(from).toISOString());
      if (to)   params.set('to',   new Date(to + 'T23:59:59').toISOString());

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">불러오는 중...</td></tr>';

      try {
        const res  = await fetch(`${API}${endpoint}?${params}`, { headers: authHeaders });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        renderTable(data);
      } catch (e) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">데이터를 불러올 수 없습니다.</td></tr>';
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');

      // 통계
      const counts = { total: data.length, GUIDE: 0, CAUTION: 0, WARNING: 0 };
      data.forEach(r => { if (counts[r.notification_level] !== undefined) counts[r.notification_level]++; });
      document.getElementById('statTotal').textContent   = counts.total;
      document.getElementById('statGuide').textContent   = counts.GUIDE;
      document.getElementById('statCaution').textContent = counts.CAUTION;
      document.getElementById('statWarning').textContent = counts.WARNING;
      document.getElementById('tableCount').textContent  = `${counts.total}건`;

      if (data.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">탐지 이벤트가 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${fmtDate(r.detected_at)}</td>
          <td>${r.student_name || '—'} (${r.student_number || '—'}번)</td>
          <td>${r.detection_type}</td>
          <td>${r.severity_level}</td>
          <td><span class="badge badge-${r.notification_level}">${levelLabel(r.notification_level)}</span></td>
          <td>${r.platform_type || '—'}</td>
          <td>${r.is_false_positive ? '✅ 오탐' : '—'}</td>
        </tr>
      `).join('');
    }

    // ── 탐지 중단 Modal ───────────────────────────────────
    function openPauseModal() {
      const now  = new Date();
      const pad  = n => String(n).padStart(2, '0');
      const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('pauseStart').value = local;
      document.getElementById('pauseModal').classList.add('show');
    }
    function closePauseModal() {
      document.getElementById('pauseModal').classList.remove('show');
    }

    async function submitPause() {
      const scopeType = document.getElementById('pauseScopeType').value;
      const gradeId   = document.getElementById('gradeSelect').value;
      const classId   = document.getElementById('classSelect').value;
      const startAt   = document.getElementById('pauseStart').value;
      const endAt     = document.getElementById('pauseEnd').value;
      const reason    = document.getElementById('pauseReason').value;

      const targetId  = scopeType === 'grade' ? gradeId : classId;
      if (!targetId)  { alert('학년/반을 선택해주세요.'); return; }
      if (!startAt || !endAt) { alert('시작/종료 일시를 입력해주세요.'); return; }

      const endpoint = scopeType === 'grade'
        ? `/manager/grades/${targetId}/pause`
        : `/manager/classes/${targetId}/pause`;

      try {
        const res = await fetch(`${API}${endpoint}`, {
          method: 'POST',
          headers: authHeaders,
          body: JSON.stringify({
            startAt: new Date(startAt).toISOString(),
            endAt:   new Date(endAt).toISOString(),
            reason,
          }),
        });
        if (res.ok) {
          alert('탐지 중단이 설정되었습니다.');
          closePauseModal();
        } else {
          const d = await res.json();
          alert(d.error || '설정 실패');
        }
      } catch (e) {
        alert('서버에 연결할 수 없습니다.');
      }
    }

    // ── 유틸 ──────────────────────────────────────────────
    function fmtDate(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function levelLabel(lv) {
      return { GUIDE: '안내', CAUTION: '주의', WARNING: '경고', NONE: '없음' }[lv] || lv;
    }
    function logout() {
      localStorage.clear();
      location.href = '/index.html';
    }

    init();
  </script>
</body>
</html>
